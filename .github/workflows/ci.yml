name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # The unit/parser tests are self-contained. The satellite integration tests stage and
      # launch Fct.LegacyHost; with no ACT install on the runner, the real FFXIV plugin and
      # OverlayPlugin are absent, so those tests skip (handshake/HWND still run) and no FFXIV
      # Network log exists, so the real-log smoke skips. The suite is green without an install.
      - name: Run tests
        shell: pwsh
        run: ./test.ps1 -Configuration Release
